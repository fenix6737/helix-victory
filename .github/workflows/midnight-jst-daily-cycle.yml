# 開発者指示書 §2 — 深夜0時以降（JST）の日次学習サイクル（PC不要・Fly API）
name: Midnight JST Daily Cycle

on:
  schedule:
    - cron: "10 15 * * *"
  workflow_dispatch:

concurrency:
  group: midnight-cycle
  cancel-in-progress: false

jobs:
  cycle:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Verify secrets
        env:
          HELIX_API_URL: ${{ secrets.HELIX_API_URL }}
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: |
          test -n "$HELIX_API_URL" || { echo "Missing secret: HELIX_API_URL"; exit 1; }
          test -n "$ADMIN_USERNAME" || { echo "Missing secret: ADMIN_USERNAME"; exit 1; }
          test -n "$ADMIN_PASSWORD" || { echo "Missing secret: ADMIN_PASSWORD"; exit 1; }

      - name: Login (retry)
        env:
          HELIX_API_URL: ${{ secrets.HELIX_API_URL }}
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: bash .github/scripts/helix-auth.sh

      - name: Daily learning cycle (all stores)
        env:
          HELIX_API_URL: ${{ secrets.HELIX_API_URL }}
        run: |
          set -euo pipefail
          url="${HELIX_API_URL%/}"
          for SID in kicona_amagasaki maruhan_umeda; do
            echo "=== daily-learning-cycle $SID ==="
            ok=0
            for i in 1 2 3; do
              body=$(curl -sS -w "\n%{http_code}" -X POST "$url/api/v1/analysis/daily-learning-cycle" \
                -H "Authorization: Bearer $HELIX_TOKEN" \
                -H "Content-Type: application/json" \
                -d "{\"store_id\":\"$SID\"}" || true)
              http=$(echo "$body" | tail -n1)
              json=$(echo "$body" | sed '$d')
              if [ "$http" = "200" ]; then
                echo "$json" | head -c 400
                echo ""
                ok=1
                break
              fi
              echo "cycle HTTP $http retry $i/3"
              [ "$i" -lt 3 ] && sleep $((i * 5))
            done
            if [ "$ok" -ne 1 ]; then
              echo "WARN: $SID cycle did not return 200 (continuing)"
            fi
          done
