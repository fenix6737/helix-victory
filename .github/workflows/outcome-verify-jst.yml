# 信頼性極大化 §④ — 深夜 JST 1:00〜4:00 に前日予測の実績照合
name: Outcome Verify JST (1-4 AM)

on:
  schedule:
    - cron: "0 16,17,18 * * *"
  workflow_dispatch:

concurrency:
  group: outcome-verify
  cancel-in-progress: false

jobs:
  reconcile:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Verify secrets
        env:
          HELIX_API_URL: ${{ secrets.HELIX_API_URL }}
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: |
          test -n "$HELIX_API_URL" || { echo "Missing secret: HELIX_API_URL"; exit 1; }
          test -n "$ADMIN_USERNAME" || { echo "Missing secret: ADMIN_USERNAME"; exit 1; }
          test -n "$ADMIN_PASSWORD" || { echo "Missing secret: ADMIN_PASSWORD"; exit 1; }

      - name: Login (retry)
        env:
          HELIX_API_URL: ${{ secrets.HELIX_API_URL }}
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: bash .github/scripts/helix-auth.sh

      - name: Record outcomes (all stores)
        env:
          HELIX_API_URL: ${{ secrets.HELIX_API_URL }}
        run: |
          set -euo pipefail
          url="${HELIX_API_URL%/}"
          for SID in kicona_amagasaki maruhan_umeda; do
            echo "=== performance reconcile $SID ==="
            for i in 1 2 3; do
              body=$(curl -sS -w "\n%{http_code}" "$url/api/v1/stores/$SID/performance?game_type=all" \
                -H "Authorization: Bearer $HELIX_TOKEN" || true)
              http=$(echo "$body" | tail -n1)
              json=$(echo "$body" | sed '$d')
              if [ "$http" = "200" ]; then
                echo "$json" | python3 -c "import sys,json; d=json.load(sys.stdin); print('outcomes_total', d.get('operations',{}).get('outcomes_total'), 'reconcile', d.get('last_reconcile_count'))"
                break
              fi
              echo "performance HTTP $http retry $i/3"
              [ "$i" -lt 3 ] && sleep $((i * 4))
            done
          done
