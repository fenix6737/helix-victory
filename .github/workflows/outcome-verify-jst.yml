# 信頼性極大化 §④ — 深夜 JST 1:00〜4:00 に前日予測の実績照合
name: Outcome Verify JST (1-4 AM)

on:
  schedule:
    # 01:00 / 02:00 / 03:00 JST = 16:00 / 17:00 / 18:00 UTC（前日）
    - cron: "0 16,17,18 * * *"
  workflow_dispatch:

jobs:
  reconcile:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Verify secrets
        env:
          HELIX_API_URL: ${{ secrets.HELIX_API_URL }}
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: |
          test -n "$HELIX_API_URL" || { echo "Missing secret: HELIX_API_URL"; exit 1; }
          test -n "$ADMIN_USERNAME" || { echo "Missing secret: ADMIN_USERNAME"; exit 1; }
          test -n "$ADMIN_PASSWORD" || { echo "Missing secret: ADMIN_PASSWORD"; exit 1; }
          echo "Secrets OK"

      - name: Record outcomes + adjust weights (all stores)
        env:
          HELIX_API_URL: ${{ secrets.HELIX_API_URL }}
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: |
          set -euo pipefail
          login_body=$(curl -sS -w "\n%{http_code}" -X POST "$HELIX_API_URL/api/v1/auth/login" \
            -H "Content-Type: application/json" \
            -d "{\"username\":\"$ADMIN_USERNAME\",\"password\":\"$ADMIN_PASSWORD\"}")
          login_http=$(echo "$login_body" | tail -n1)
          login_json=$(echo "$login_body" | sed '$d')
          if [ "$login_http" != "200" ]; then
            echo "Login failed HTTP $login_http — run scripts/sync-github-secrets.ps1 after Fly deploy"
            echo "$login_json" | head -c 200
            exit 1
          fi
          TOKEN=$(echo "$login_json" | python3 -c "import sys,json; print(json.load(sys.stdin)['access_token'])")
          for SID in kicona_amagasaki maruhan_umeda; do
            echo "=== performance reconcile $SID ==="
            perf_body=$(curl -sS -w "\n%{http_code}" "$HELIX_API_URL/api/v1/stores/$SID/performance?game_type=all" \
              -H "Authorization: Bearer $TOKEN")
            perf_http=$(echo "$perf_body" | tail -n1)
            perf_json=$(echo "$perf_body" | sed '$d')
            if [ "$perf_http" != "200" ]; then
              echo "performance HTTP $perf_http for $SID"
              echo "$perf_json" | head -c 200
              exit 1
            fi
            echo "$perf_json" | python3 -c "import sys,json; d=json.load(sys.stdin); print('outcomes_total', d.get('operations',{}).get('outcomes_total'), 'reconcile', d.get('last_reconcile_count'))"
          done
