# 毎日 Fly API 認証を検証（失敗時はログにヒントのみ — 他ジョブの前提確認用）
name: Secrets Health Check

on:
  schedule:
    - cron: "30 */6 * * *"
  workflow_dispatch:

concurrency:
  group: secrets-health
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Verify secrets present
        env:
          HELIX_API_URL: ${{ secrets.HELIX_API_URL }}
          INGEST_API_KEY: ${{ secrets.INGEST_API_KEY }}
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: |
          missing=0
          for k in HELIX_API_URL INGEST_API_KEY ADMIN_USERNAME ADMIN_PASSWORD; do
            v="${!k}"
            if [ -z "$v" ]; then echo "MISSING $k"; missing=1; fi
          done
          [ "$missing" -eq 0 ] || exit 1

      - name: Login smoke test
        env:
          HELIX_API_URL: ${{ secrets.HELIX_API_URL }}
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: bash .github/scripts/helix-auth.sh

      - name: Ingest key smoke test
        env:
          HELIX_API_URL: ${{ secrets.HELIX_API_URL }}
          INGEST_API_KEY: ${{ secrets.INGEST_API_KEY }}
        run: |
          url="${HELIX_API_URL%/}"
          code=$(curl -sS -o /dev/null -w "%{http_code}" -X POST "$url/api/v1/ingest/logs" \
            -H "Content-Type: application/json" \
            -H "X-Ingest-Key: $INGEST_API_KEY" \
            -d '{"store_id":"kicona_amagasaki","logs":[]}' || echo "000")
          if [ "$code" = "401" ]; then
            echo "INGEST_API_KEY mismatch — run scripts/sync-github-secrets.ps1 on PC after Fly deploy"
            exit 1
          fi
          echo "ingest probe HTTP $code (200/422 expected for empty logs)"
